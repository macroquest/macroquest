{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-6">
  <div class="w-full max-w-sm bg-gray-800 rounded-lg shadow-xl p-8 border border-gray-700">
    <div class="text-center mb-6">
      <span class="text-4xl">⚙</span>
      <h1 class="text-2xl font-bold text-orange-400 mt-2">MQ Admin</h1>
      <p class="text-gray-400 text-sm mt-1">MacroQuest Build Panel</p>
    </div>
    {% for flash in flashes %}
    <div class="mb-4 px-3 py-2 rounded text-sm {% if flash.level == 'error' %}bg-red-900 border border-red-600{% else %}bg-blue-900 border border-blue-600{% endif %}">
      {{ flash.message }}
    </div>
    {% endfor %}
    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1">Username</label>
        <input name="username" type="text" required autofocus
               class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-orange-500">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">Password</label>
        <input name="password" type="password" required
               class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-orange-500">
      </div>
      <button type="submit"
              class="w-full bg-orange-600 hover:bg-orange-500 text-white font-semibold py-2 rounded transition">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
