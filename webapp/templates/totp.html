{% extends "base.html" %}

{% block title %}Two-Factor Authentication{% endblock %}

{% block auth_content %}
<div class="w-full max-w-sm" x-data="{ loading: false, code: '' }">

    <!-- Brand mark -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-red-700/80 shadow-lg mb-4">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>
        <h1 class="text-xl font-semibold text-gray-100">Two-Factor Authentication</h1>
        <p class="text-sm text-gray-500 mt-1">Enter the code from your authenticator app</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-800 rounded-xl border border-gray-700/50 shadow-2xl p-8">

        <!-- Error banner -->
        {% if error %}
        <div class="flex items-center gap-2 mb-5 px-3 py-2.5 rounded-lg bg-red-900/50 border border-red-700/50 text-red-300 text-sm">
            <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" action="/auth/totp" @submit="loading = true" class="space-y-6">

            <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

            <!-- Code input -->
            <div>
                <label for="code" class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">
                    Authenticator Code
                </label>
                <input
                    id="code"
                    name="code"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    maxlength="6"
                    required
                    autofocus
                    autocomplete="one-time-code"
                    x-model="code"
                    class="w-full px-3 py-3 bg-gray-900 border border-gray-700 rounded-lg
                           text-2xl font-mono text-center tracking-[0.4em] text-gray-100
                           placeholder-gray-700
                           focus:outline-none focus:ring-2 focus:ring-red-600/50 focus:border-red-600/50
                           transition-colors duration-150"
                    placeholder="000000"
                />
                <p class="mt-1.5 text-xs text-gray-600 text-center">6-digit code, no spaces</p>
            </div>

            <!-- Submit -->
            <button
                type="submit"
                :disabled="loading || code.length !== 6"
                class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-red-700 hover:bg-red-600
                       disabled:opacity-50 disabled:cursor-not-allowed
                       text-white text-sm font-semibold rounded-lg
                       focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 focus:ring-offset-gray-800
                       transition-colors duration-150"
            >
                <svg x-show="loading" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span x-show="!loading">Verify Code</span>
                <span x-show="loading" x-cloak>Verifying…</span>
            </button>

        </form>
    </div>

    <!-- Back to login -->
    <p class="mt-5 text-center text-sm text-gray-600">
        <a href="/auth/logout" class="text-gray-500 hover:text-gray-300 transition-colors duration-150">
            &larr; Back to login
        </a>
    </p>
</div>
{% endblock %}
