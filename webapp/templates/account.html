{% extends "base.html" %}
{% block title %}My Account{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">My Account</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl">

  <!-- Change password -->
  <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
    <h2 class="font-semibold mb-4 text-orange-400">Change Password</h2>
    <form method="post" action="/account/password" class="space-y-3">
      <div>
        <label class="block text-xs text-gray-400 mb-1">Current Password</label>
        <input name="current_password" type="password" required
               class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">New Password (min 12 chars)</label>
        <input name="new_password" type="password" minlength="12" required
               class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Confirm New Password</label>
        <input name="confirm_password" type="password" minlength="12" required
               class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
      </div>
      <button type="submit" class="bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded text-sm font-semibold transition">
        Change Password
      </button>
    </form>
  </div>

  <!-- Reset 2FA -->
  <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
    <h2 class="font-semibold mb-4 text-orange-400">Reset Two-Factor Authentication</h2>
    <p class="text-sm text-gray-400 mb-4">Re-enroll your authenticator app. Confirm with your current password.</p>
    <form method="post" action="/account/reset-2fa" class="space-y-3">
      <div>
        <label class="block text-xs text-gray-400 mb-1">Current Password</label>
        <input name="current_password" type="password" required
               class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
      </div>
      <button type="submit" class="bg-yellow-700 hover:bg-yellow-600 text-white px-4 py-2 rounded text-sm font-semibold transition">
        Reset & Re-enroll 2FA
      </button>
    </form>
  </div>
</div>
{% endblock %}
