{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Settings</h1>
<form method="post" action="/settings/save" class="space-y-6 max-w-2xl">

  <!-- RedGuides -->
  <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
    <h2 class="font-semibold mb-4 text-orange-400">RedGuides Configuration</h2>
    <div class="space-y-3">
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">LIVE Resource ID</label>
          <input name="rg_id_live" type="text" value="{{ rg_id_live }}" placeholder="1234"
                 class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">TEST Resource ID</label>
          <input name="rg_id_test" type="text" value="{{ rg_id_test }}" placeholder="1235"
                 class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">EMU Resource ID</label>
          <input name="rg_id_emu" type="text" value="{{ rg_id_emu }}" placeholder="1236"
                 class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
        </div>
      </div>
      <div x-data="{ show: false }">
        <label class="block text-xs text-gray-400 mb-1">API Key</label>
        <div class="flex gap-2">
          <input name="rg_api_key" :type="show ? 'text' : 'password'" placeholder="Leave blank to keep existing"
                 class="flex-1 bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
          <button type="button" @click="show=!show" class="text-xs text-gray-400 hover:text-gray-300 px-2">
            <span x-text="show ? 'Hide' : 'Show'"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Discord -->
  <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
    <h2 class="font-semibold mb-4 text-orange-400">Discord Notifications</h2>
    <div x-data="{ show: false }">
      <label class="block text-xs text-gray-400 mb-1">Webhook URL</label>
      <div class="flex gap-2">
        <input name="discord_webhook" :type="show ? 'text' : 'password'" placeholder="https://discord.com/api/webhooks/..."
               class="flex-1 bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
        <button type="button" @click="show=!show" class="text-xs text-gray-400 hover:text-gray-300 px-2" x-text="show ? 'Hide' : 'Show'"></button>
      </div>
      <p class="text-xs text-gray-500 mt-1">Posted to a threads-only channel after each build. Leave blank to disable.</p>
    </div>
  </div>

  <div>
    <button type="submit" class="bg-orange-600 hover:bg-orange-500 text-white px-6 py-2 rounded font-semibold text-sm transition">
      Save Settings
    </button>
  </div>
</form>
{% endblock %}
