{% extends "base.html" %}
{% block title %}Plugin Manager{% endblock %}
{% block content %}
<div x-data="pluginMgr()" x-init="init()">
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Plugin Manager</h1>
  <button @click="savePlugins()" class="bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded font-semibold text-sm transition">
    💾 Save & Commit
  </button>
</div>

<!-- Tab nav -->
<div class="flex gap-1 mb-4 border-b border-gray-700">
  <button @click="tab='all'" :class="tab==='all' ? 'border-b-2 border-orange-500 text-white' : 'text-gray-400'"
          class="px-4 py-2 text-sm font-medium">All Environments</button>
  <button @click="tab='live_test'" :class="tab==='live_test' ? 'border-b-2 border-orange-500 text-white' : 'text-gray-400'"
          class="px-4 py-2 text-sm font-medium">Live / Test Only</button>
  <button @click="tab='emu'" :class="tab==='emu' ? 'border-b-2 border-orange-500 text-white' : 'text-gray-400'"
          class="px-4 py-2 text-sm font-medium">Emu Only</button>
</div>

<!-- Plugin table -->
<div class="bg-gray-800 rounded-lg border border-gray-700 mb-6">
  <table class="w-full text-sm">
    <thead class="bg-gray-900 text-gray-400 text-xs uppercase">
      <tr>
        <th class="px-4 py-2 text-left">Name / Source</th>
        <th class="px-4 py-2 text-left">Type</th>
        <th class="px-4 py-2 text-left">Enabled</th>
        <th class="px-4 py-2 text-left">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-700">
      <template x-for="(p, idx) in currentList()" :key="idx">
        <tr>
          <td class="px-4 py-2 font-mono text-xs text-gray-300 max-w-xs truncate">
            <span x-text="p.name || p.url || ('RedGuides #' + p.resource_id)"></span>
          </td>
          <td class="px-4 py-2">
            <span :class="p.type==='git' ? 'bg-blue-800 text-blue-300' : 'bg-purple-800 text-purple-300'"
                  class="px-2 py-0.5 rounded text-xs" x-text="p.type"></span>
          </td>
          <td class="px-4 py-2">
            <button @click="toggleEnabled(tab, idx)"
                    :class="p.enabled !== false ? 'bg-green-700 hover:bg-green-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-2 py-0.5 rounded text-xs transition" x-text="p.enabled !== false ? 'Enabled' : 'Disabled'"></button>
          </td>
          <td class="px-4 py-2">
            <button @click="removePlugin(tab, idx)" class="text-red-400 hover:text-red-300 text-xs">Remove</button>
          </td>
        </tr>
      </template>
      <tr x-show="currentList().length === 0">
        <td colspan="4" class="px-4 py-6 text-center text-gray-500 italic">No plugins in this section</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Add plugin form -->
<div class="bg-gray-800 rounded-lg border border-gray-700 p-5">
  <h2 class="font-semibold mb-4">Add Plugin</h2>
  <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
    <div>
      <label class="block text-xs text-gray-400 mb-1">Type</label>
      <select x-model="newPlugin.type" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
        <option value="git">Git Repository</option>
        <option value="redguides">RedGuides Resource</option>
      </select>
    </div>
    <div x-show="newPlugin.type === 'git'" class="md:col-span-2">
      <label class="block text-xs text-gray-400 mb-1">Git URL</label>
      <input x-model="newPlugin.url" type="text" placeholder="https://github.com/user/plugin"
             class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
    </div>
    <div x-show="newPlugin.type === 'git'">
      <label class="block text-xs text-gray-400 mb-1">Branch (optional)</label>
      <input x-model="newPlugin.branch" type="text" placeholder="main"
             class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
    </div>
    <div x-show="newPlugin.type === 'redguides'">
      <label class="block text-xs text-gray-400 mb-1">Resource ID</label>
      <input x-model="newPlugin.resource_id" type="number" placeholder="1234"
             class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">Display Name (optional)</label>
      <input x-model="newPlugin.name" type="text" placeholder="MyPlugin"
             class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
    </div>
    <div>
      <button @click="addPlugin()" class="w-full bg-blue-700 hover:bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-semibold transition">
        + Add to <span x-text="tab"></span>
      </button>
    </div>
  </div>
</div>

<!-- Hidden form for saving -->
<form id="saveForm" method="post" action="/plugins/save" class="hidden">
  <input type="hidden" name="plugins_json" id="pluginsJsonInput">
</form>
</div>

<script>
function pluginMgr() {
  return {
    tab: 'all',
    data: {{ plugin_data | tojson }},
    plugins_sha: '{{ plugins_sha }}',
    newPlugin: { type: 'git', url: '', branch: '', resource_id: '', name: '', enabled: true },
    init() {},
    currentList() { return this.data[this.tab] || []; },
    addPlugin() {
      const p = { type: this.newPlugin.type, enabled: true };
      if (p.type === 'git') {
        p.url = this.newPlugin.url;
        if (this.newPlugin.branch) p.branch = this.newPlugin.branch;
      } else {
        p.resource_id = parseInt(this.newPlugin.resource_id);
      }
      if (this.newPlugin.name) p.name = this.newPlugin.name;
      if (!this.data[this.tab]) this.data[this.tab] = [];
      this.data[this.tab].push(p);
      this.newPlugin = { type: 'git', url: '', branch: '', resource_id: '', name: '', enabled: true };
    },
    removePlugin(section, idx) { this.data[section].splice(idx, 1); },
    toggleEnabled(section, idx) {
      const p = this.data[section][idx];
      p.enabled = p.enabled === false ? true : false;
    },
    savePlugins() {
      document.getElementById('pluginsJsonInput').value = JSON.stringify(this.data, null, 2);
      document.getElementById('saveForm').submit();
    }
  };
}
</script>
{% endblock %}
