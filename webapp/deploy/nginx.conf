# MacroQuest Admin Panel — nginx configuration
# Place at: /etc/nginx/sites-available/mq-admin
# Enable: ln -s /etc/nginx/sites-available/mq-admin /etc/nginx/sites-enabled/mq-admin
# Test:   nginx -t
# Reload: systemctl reload nginx

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow certbot ACME challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy → uvicorn
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # Modern TLS configuration (Mozilla Intermediate)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    # Content-Security-Policy: tighten after confirming CDN hashes if needed
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Rate limiting ────────────────────────────────────────────
    # Define in http{} block in nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=mq_login:10m rate=5r/m;
    location /auth/login {
        limit_req zone=mq_login burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SSE endpoint (no buffering) ──────────────────────────────
    location ~ ^/builds/[^/]+/stream$ {
        proxy_pass             http://127.0.0.1:8000;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        # SSE: disable all buffering so events arrive in real time
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";
        chunked_transfer_encoding on;
        # Nginx-level gzip would break streaming; ensure it's off here
        gzip                   off;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Accel-Buffering "no" always;
    }

    # ── Backup download (allow large response) ───────────────────
    location /backup/download {
        proxy_pass           http://127.0.0.1:8000;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_read_timeout   120s;
        # Allow buffering for file download
        proxy_buffering      on;
        proxy_buffer_size    16k;
        proxy_buffers        8 32k;
    }

    # ── Static files served directly (if present) ───────────────
    location /static/ {
        alias      /opt/mq-admin/webapp/static/;
        expires    7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Default proxy ────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        # Upload size limit (for backup restore)
        client_max_body_size 64m;
    }

    # ── Deny hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
