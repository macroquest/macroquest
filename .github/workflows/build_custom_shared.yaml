name: Build Custom Shared

on:
  workflow_call:
    inputs:
      client_target:
        required: true
        type: string
      resource_id:
        required: false
        type: string
        default: ''
    secrets:
      REDGUIDES_API_KEY:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false
      CUSTOM_EQLIB_PAT:
        required: false
      SIGNCERT:
        required: false
      SIGNCERT_PASS:
        required: false

env:
  platform: "${{ inputs.client_target == 'emu' && 'Win32' || 'x64' }}"

jobs:
  build:
    runs-on: [fast, self-hosted, Windows, X64]
    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout (no submodules — we handle them manually below)
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      # -----------------------------------------------------------------------
      # 2. Sync submodule URLs so .git/config reflects .gitmodules
      # -----------------------------------------------------------------------
      - name: Sync submodule URLs
        run: git submodule sync --recursive

      # -----------------------------------------------------------------------
      # 3. Init all submodules EXCEPT src/eqlib (handled separately below)
      # -----------------------------------------------------------------------
      - name: Init non-eqlib submodules
        run: git -c submodule."src/eqlib".update=none submodule update --init --recursive --depth=1

      # -----------------------------------------------------------------------
      # 4. Clone / update custom eqlib
      #    Branch matches client_target (live / test / emu).
      #    Uses vars.CUSTOM_EQLIB_REPO (set as a repository variable in GitHub).
      #    If CUSTOM_EQLIB_PAT is supplied, injects it as x-access-token so
      #    private repos work without SSH keys on the runner.
      #    Falls back to the bundled eqlib submodule when the variable is unset.
      # -----------------------------------------------------------------------
      - name: Clone or update custom eqlib
        shell: pwsh
        env:
          CUSTOM_EQLIB_PAT:  ${{ secrets.CUSTOM_EQLIB_PAT }}
          CUSTOM_EQLIB_REPO: ${{ vars.CUSTOM_EQLIB_REPO }}
        run: |
          $repoUrl = $env:CUSTOM_EQLIB_REPO
          if ([string]::IsNullOrWhiteSpace($repoUrl)) {
            Write-Host "CUSTOM_EQLIB_REPO is not set — using bundled eqlib submodule."
            git submodule update --init --depth=1 src/eqlib
            if ($LASTEXITCODE -ne 0) { throw "Failed to init eqlib submodule" }
            exit 0
          }

          # Inject PAT into HTTPS URL when available
          $pat = $env:CUSTOM_EQLIB_PAT
          if (-not [string]::IsNullOrWhiteSpace($pat)) {
            if ($repoUrl -match '^(https?://)(.+)$') {
              $repoUrl = "$($Matches[1])x-access-token:$pat@$($Matches[2])"
            }
          }

          $eqlibDir = "src/eqlib"
          $branch   = "${{ inputs.client_target }}"

          if (Test-Path (Join-Path $eqlibDir '.git')) {
            Write-Host "Updating existing custom eqlib at $eqlibDir (branch: $branch)"
            & git -C $eqlibDir fetch --depth=1 origin $branch
            if ($LASTEXITCODE -ne 0) { throw "git fetch failed for custom eqlib" }
            & git -C $eqlibDir checkout $branch
            if ($LASTEXITCODE -ne 0) { throw "git checkout failed for custom eqlib" }
            & git -C $eqlibDir reset --hard "origin/$branch"
            if ($LASTEXITCODE -ne 0) { throw "git reset failed for custom eqlib" }
          } else {
            Write-Host "Cloning custom eqlib into $eqlibDir (branch: $branch)"
            # Remove the empty directory that submodule init may have created
            if (Test-Path $eqlibDir) {
              Remove-Item -Recurse -Force $eqlibDir
            }
            & git clone --depth 1 -b $branch $repoUrl $eqlibDir
            if ($LASTEXITCODE -ne 0) { throw "git clone failed for custom eqlib" }
          }

          # Init any submodules inside eqlib itself
          & git -C $eqlibDir submodule update --init --recursive --depth=1
          if ($LASTEXITCODE -ne 0) { throw "git submodule update failed inside eqlib" }

      # -----------------------------------------------------------------------
      # 5. Setup MSBuild
      # -----------------------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # -----------------------------------------------------------------------
      # 6. Check whether vcpkg is already installed on this runner
      # -----------------------------------------------------------------------
      - name: Check vcpkg Installation
        id: check_vcpkg
        shell: pwsh
        run: |
          $installedPath = "${{ github.workspace }}/contrib/vcpkg/installed"
          if ((Test-Path $installedPath) -and (Get-ChildItem $installedPath -Directory | Measure-Object).Count -gt 0) {
            echo "vcpkg_installed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "vcpkg_installed=false" >> $env:GITHUB_OUTPUT
          }

      # -----------------------------------------------------------------------
      # 7. Restore vcpkg cache only when vcpkg is not already present
      # -----------------------------------------------------------------------
      - name: Restore vcpkg Cache
        if: steps.check_vcpkg.outputs.vcpkg_installed != 'true'
        uses: actions/cache@v4
        with:
          path: |
            contrib/vcpkg/buildtrees
            contrib/vcpkg/downloads
            contrib/vcpkg/installed
            contrib/vcpkg/packages
            contrib/vcpkg/vcpkg.exe
            contrib/vcpkg/vcpkg_mq_last_bootstrap*.txt
          key: ${{ runner.os }}-vcpkg-${{ env.platform }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ env.platform }}-
            ${{ runner.os }}-vcpkg-

      # -----------------------------------------------------------------------
      # 8. Fetch custom plugins listed in custom_plugins.json
      # -----------------------------------------------------------------------
      - name: Fetch custom plugins
        shell: pwsh
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        run: |
          $extraArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($env:REDGUIDES_API_KEY)) {
            $extraArgs += @('-RedGuidesApiKey', $env:REDGUIDES_API_KEY)
          }
          .\scripts\Fetch-CustomPlugins.ps1 -ClientTarget '${{ inputs.client_target }}' @extraArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # -----------------------------------------------------------------------
      # 9. Capture full 40-char commit SHAs for MQ, eqlib, and git plugins
      # -----------------------------------------------------------------------
      - name: Capture commit SHAs
        id: shas
        shell: pwsh
        run: |
          # Full 40-character hashes
          $mqSha    = & git rev-parse HEAD
          $eqlibSha = & git -C src/eqlib rev-parse HEAD

          echo "mq_sha=$mqSha"       >> $env:GITHUB_OUTPUT
          echo "eqlib_sha=$eqlibSha" >> $env:GITHUB_OUTPUT

          # Collect SHAs for all enabled git-sourced plugins
          $manifest = Get-Content custom_plugins.json -Raw | ConvertFrom-Json

          $sections = @('all')
          if ('${{ inputs.client_target }}' -eq 'emu') {
            $sections += 'emu'
          } else {
            $sections += 'live_test'
          }

          $pluginLines = @()
          foreach ($section in $sections) {
            $entries = $manifest.$section
            if ($null -eq $entries) { continue }
            foreach ($entry in $entries) {
              # Skip disabled plugins
              if ($entry.PSObject.Properties.Name -contains 'enabled' -and $entry.enabled -eq $false) {
                continue
              }
              if ($entry.type -ne 'git') { continue }

              # Derive name using the same logic as Fetch-CustomPlugins.ps1
              $name = if (
                $entry.PSObject.Properties.Name -contains 'name' -and
                -not [string]::IsNullOrWhiteSpace($entry.name)
              ) {
                $entry.name
              } else {
                ($entry.url.TrimEnd('/') -split '/')[-1] -replace '\.git$', ''
              }

              $pluginDir = "plugins/$name"
              if (Test-Path (Join-Path $pluginDir '.git')) {
                $sha = & git -C $pluginDir rev-parse HEAD
                $pluginLines += "$name $sha"
              } else {
                Write-Warning "Plugin directory not found or not a git repo: $pluginDir"
              }
            }
          }

          # Write as a multiline GITHUB_OUTPUT value
          $delimiter  = "EOF_PLUGIN_SHAS_${{ github.run_id }}"
          $pluginShas = $pluginLines -join "`n"
          echo "plugin_shas<<$delimiter" >> $env:GITHUB_OUTPUT
          echo $pluginShas               >> $env:GITHUB_OUTPUT
          echo $delimiter                >> $env:GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # 10. Stamp build number and git hash into MQVersionInfo.h
      # -----------------------------------------------------------------------
      - name: Set version build number
        shell: pwsh
        continue-on-error: true
        run: |
          $versionFile = "src/main/MQVersionInfo.h"
          if (-not (Test-Path $versionFile)) {
            Write-Host "MQVersionInfo.h not found — skipping version stamp."
            exit 0
          }
          $content = Get-Content $versionFile
          $content = $content -replace '#define MQMAIN_VERSION_BUILD (\d+)', "#define MQMAIN_VERSION_BUILD ${{ github.run_number }}"
          $content = $content -replace '#define MQMAIN_GIT_HASH "(.*)"',      "#define MQMAIN_GIT_HASH `"${{ steps.shas.outputs.mq_sha }}`""
          $content | Set-Content $versionFile
          Write-Host "Version stamped: build=${{ github.run_number }}, hash=${{ steps.shas.outputs.mq_sha }}"

      # -----------------------------------------------------------------------
      # 11. Generate Visual Studio solution via CMake
      # -----------------------------------------------------------------------
      - name: Generate solution
        shell: pwsh
        run: |
          .\gen_solution.ps1 -SkipLauncher -SolutionName MacroQuestCustom.sln
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # -----------------------------------------------------------------------
      # 12. Restore NuGet packages (best-effort; CMake builds may not need it)
      # -----------------------------------------------------------------------
      - name: Restore NuGet packages
        continue-on-error: true
        run: nuget restore build/MacroQuestCustom.sln

      # -----------------------------------------------------------------------
      # 13. Build: MQ2Main first to satisfy downstream plugin dependencies,
      #     then build the full solution
      # -----------------------------------------------------------------------
      - name: Build MQ2Main
        run: >
          msbuild build/MacroQuestCustom.sln
          /NoLogo
          /Verbosity:minimal
          /p:Configuration=Release
          /p:Platform=${{ env.platform }}
          /m
          /t:core\MQ2Main
          /p:PreferredToolArchitecture=x64

      - name: Build full solution
        run: >
          msbuild build/MacroQuestCustom.sln
          /NoLogo
          /Verbosity:minimal
          /p:Configuration=Release
          /p:Platform=${{ env.platform }}
          /m
          /p:PreferredToolArchitecture=x64

      # -----------------------------------------------------------------------
      # 14. Sign binaries (only when SIGNCERT secret is populated)
      # -----------------------------------------------------------------------
      - name: Sign code
        shell: pwsh
        env:
          SIGNCERT:      ${{ secrets.SIGNCERT }}
          SIGNCERT_PASS: ${{ secrets.SIGNCERT_PASS }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNCERT)) {
            Write-Host "SIGNCERT not set — skipping code signing."
            exit 0
          }

          $SignCert = "build/bin/signcert.pfx"
          [IO.File]::WriteAllBytes($SignCert, [Convert]::FromBase64String($env:SIGNCERT))

          $FileList = Get-ChildItem -Path "build/bin/Release" -Recurse -Include *.exe, *.dll |
                      Where-Object { $_.Name -ne "D3DX9_43.dll" }

          $signtool = (
            Get-ChildItem -Recurse "${ENV:ProgramFiles(x86)}\Windows Kits" -Filter signtool.exe |
            Where-Object { $_.FullName -notmatch 'arm' } |
            Sort-Object LastWriteTime |
            Select-Object -Last 1
          ).FullName

          if ([string]::IsNullOrWhiteSpace($signtool)) {
            Remove-Item -Force $SignCert
            throw "signtool.exe not found — ensure Windows SDK is installed on the runner."
          }

          foreach ($file in $FileList) {
            & $signtool sign /fd SHA256 /f $SignCert /p $env:SIGNCERT_PASS /t http://timestamp.digicert.com "$file" | Out-Null
            if ($LASTEXITCODE -ne 0) {
              Remove-Item -Force $SignCert
              throw "Signing failed for: $($file.FullName)"
            }
          }

          Remove-Item -Force $SignCert
          Write-Host "Code signing complete ($($FileList.Count) files signed)."

      # -----------------------------------------------------------------------
      # 15. Create release archive
      # -----------------------------------------------------------------------
      - name: Create archive
        shell: pwsh
        run: |
          $archiveName = "MacroQuest-${{ inputs.client_target }}.zip"
          Push-Location build/bin/Release
          7z a -tzip -r "../../../$archiveName" *
          Pop-Location
          Write-Host "Archive created: $archiveName"

      # -----------------------------------------------------------------------
      # 16. Upload artifact (retained for 7 days)
      # -----------------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroQuest-${{ inputs.client_target }}
          path: MacroQuest-${{ inputs.client_target }}.zip
          retention-days: 7

      # -----------------------------------------------------------------------
      # 17. Publish to RedGuides (only when resource_id is provided)
      # -----------------------------------------------------------------------
      - name: Publish to RedGuides
        if: inputs.resource_id != ''
        uses: RedGuides/redguides-publish@v1
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        with:
          resource_id: ${{ inputs.resource_id }}
          file_path:   MacroQuest-${{ inputs.client_target }}.zip

      # -----------------------------------------------------------------------
      # 18. Post Discord notification (plain text, no embeds)
      #
      #   Format (matches screenshot exactly):
      #
      #     Live server build 260423.3807
      #
      #     eqlib b38454722cecd7c00a81c20b9c8a3a256e92f57b
      #     mq    7d6e5a81ef31a8546871d3a4edf66c925d477f0e
      #     pluginname abc123...
      #
      # -----------------------------------------------------------------------
      - name: Post Discord notification
        continue-on-error: true
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PLUGIN_SHAS:         ${{ steps.shas.outputs.plugin_shas }}
          MQ_SHA:              ${{ steps.shas.outputs.mq_sha }}
          EQLIB_SHA:           ${{ steps.shas.outputs.eqlib_sha }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DISCORD_WEBHOOK_URL)) {
            Write-Host "DISCORD_WEBHOOK_URL not set — skipping Discord notification."
            exit 0
          }

          # Build number: YYMMDD.run_number
          $dateStamp   = (Get-Date -Format 'yyMMdd')
          $buildNumber = "$dateStamp.${{ github.run_number }}"

          # Title-case the target name (live -> Live, emu -> Emu, test -> Test)
          $targetLabel = (Get-Culture).TextInfo.ToTitleCase('${{ inputs.client_target }}')

          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add("$targetLabel server build $buildNumber")
          $lines.Add("")
          $lines.Add("eqlib $($env:EQLIB_SHA)")
          $lines.Add("mq    $($env:MQ_SHA)")

          # Append one line per git-sourced plugin: "name sha"
          if (-not [string]::IsNullOrWhiteSpace($env:PLUGIN_SHAS)) {
            foreach ($pluginLine in ($env:PLUGIN_SHAS -split "`n")) {
              $pluginLine = $pluginLine.Trim()
              if ([string]::IsNullOrWhiteSpace($pluginLine)) { continue }
              $parts = $pluginLine -split ' ', 2
              $pName = $parts[0]
              $pSha  = if ($parts.Count -gt 1) { $parts[1] } else { '(unknown)' }
              $lines.Add("$pName $pSha")
            }
          }

          $messageText = $lines -join "`n"
          $payload     = @{ content = $messageText } | ConvertTo-Json -Compress

          Invoke-RestMethod `
            -Uri         $env:DISCORD_WEBHOOK_URL `
            -Method      Post `
            -Body        $payload `
            -ContentType 'application/json'

          Write-Host "Discord notification sent."
