name: Build MacroQuest Emu Release

on:
  push:
    tags:
      - rel-emu
      - rel-emu-rof2

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  call_build:
    uses: ./.github/workflows/build_release_shared.yaml
    with:
      client_target: emu-rof2
    secrets: inherit