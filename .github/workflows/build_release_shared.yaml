name: Build Shared

on:
  workflow_call:
    inputs:
      client_target:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      client_target:
        required: true
        type: choice
        # These should also be updated in the version_rev map below when adding new targets
        options:
        - emu-rof2
        - emu-tob
        - beta-emu-rof2
        - beta-emu-tob

env:
  platform: "${{ contains(inputs.client_target, 'rof2') && 'Win32' || 'x64' }}"
  scoop_packages: "sentry-cli"
  # Version revision map -- update this when adding new client targets
  version_rev: >-
    ${{ fromJSON('{
      "live":          1,
      "test":          2,
      "beta-emu-rof2": 3,
      "emu-rof2":      4,
      "beta-emu-tob":  5,
      "emu-tob":       6
    }')[inputs.client_target] }}

jobs:
  build:
    if: github.repository == 'macroquest/macroquest'
    runs-on: [fast, self-hosted, Windows, X64]
    outputs:
      vcpkg_fingerprint: ${{ steps.vcpkg_post.outputs.hash }}
    steps:
      - name: Validate version revision
        if: env.version_rev == ''
        run: |
          echo "::error:: Target '${{ inputs.client_target }}' has no version_rev defined. Update the version revision map in the env block."
          exit 1

      - name: Install and cache PowerShell modules
        uses: Knightly1/psmodulecache@v6
        with:
          modules-to-cache: powershell-yaml

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Reset eqlib
        run: git -C src/eqlib reset --hard
        continue-on-error: true

      - name: Sync submodule URLs
        run: git submodule sync --recursive

      - name: Update builtin submodules
        run: git submodule update --init --recursive --depth=1

      - name: Get extra plugins from docs site
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/macroquest/docs/master/main/plugin-quick-list.md" -OutFile "plugin-quick-list.md"

      - name: Checkout plugins that work on all clients
        shell: pwsh
        run: |
          $start = Select-String -Path plugin-quick-list.md -Pattern "^# All" -CaseSensitive
          $end = Select-String -Path plugin-quick-list.md -Pattern "^(#|``)" -CaseSensitive | Where-Object { $_.LineNumber -gt $start.LineNumber } | Select-Object -First 1
          $content = Get-Content plugin-quick-list.md | Select-Object -Index ($start.LineNumber..($end.LineNumber - 2))
          $content | ForEach-Object {
            $cmd = $_.Trim()
            if ($cmd.StartsWith("git clone")) {
              Invoke-Expression $cmd
            }
          }

      - name: Checkout plugins that work on Live/Test clients
        #if: ${{ inputs.client_target == 'live' || inputs.client_target == 'test' }}
        shell: pwsh
        run: |
          $start = Select-String -Path plugin-quick-list.md -Pattern "^# Live/Test only" -CaseSensitive
          $end = Select-String -Path plugin-quick-list.md -Pattern "^(#|``)" | Where-Object { $_.LineNumber -gt $start.LineNumber } | Select-Object -First 1
          $content = Get-Content plugin-quick-list.md | Select-Object -Index ($start.LineNumber..($end.LineNumber - 2))
          $content | ForEach-Object {
            $cmd = $_.Trim()
            if ($cmd.StartsWith("git clone")) {
              Invoke-Expression $cmd
            }
          }

      - name: Checkout plugins that work on RoF2 clients
        shell: pwsh
        run: |
          $start = Select-String -Path plugin-quick-list.md -Pattern "^# RoF2 only" -CaseSensitive
          $end = Select-String -Path plugin-quick-list.md -Pattern "^(#|``)" | Where-Object { $_.LineNumber -gt $start.LineNumber } | Select-Object -First 1
          $content = Get-Content plugin-quick-list.md | Select-Object -Index ($start.LineNumber..($end.LineNumber - 2))
          $content | ForEach-Object {
            $cmd = $_.Trim()
            if ($cmd.StartsWith("git clone")) {
              $cmd = $cmd -replace "git clone", "git clone --depth=1"
              Invoke-Expression $cmd
            }
          }

      - name: Checkout beta branch for plugins
        if: contains(inputs.client_target, 'beta')
        shell: pwsh
        run: |
          Get-ChildItem plugins -Directory | ForEach-Object { Write-Host "Checking for beta branch in $($_.Name)"; git -C "$($_.FullName)" checkout beta 2>$null }
          exit 0

      - name: Update Plugin Submodules
        shell: pwsh
        run: |
          Get-ChildItem plugins -Directory | ForEach-Object { Write-Host "$($_.Name)"; git -C "$($_.FullName)" submodule update --init --recursive --depth=1 }

      - name: Validate Plugin Projects
        shell: pwsh
        run: |
          $result = & "${{ github.workspace }}/tools/build_scripts/Validate_Plugin_Projects.ps1" -PluginsDirectory "${{ github.workspace }}/plugins" -Whitelist @("MQ2Nav")
          $exitCode = $LASTEXITCODE
          $discordMessage = ($result -join "`n")
          if ($discordMessage.Length -gt 4000) {
            $discordMessage = $discordMessage.Substring(0, 4000)
          }
          if ($exitCode -ne 0) {
            Write-Warning $discordMessage
            [System.Collections.ArrayList]$embedArray = @()
            $embedObject = [PSCustomObject]@{
                color = "15548997"
                title = "Plugin validation failed (${{ github.ref_name }})"
                description = $discordMessage
            }
            $embedArray.Add($embedObject) | Out-Null
            $discordPayload = [PSCustomObject]@{
                embeds = $embedArray
            } | ConvertTo-Json
            Invoke-RestMethod -Uri '${{ secrets.MQDISCORD_DEV_WEBHOOK }}' -Method Post -Body $discordPayload -ContentType 'application/json'
            exit 1
          }

      - name: Get SLN file from docs site
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/macroquest/docs/master/uploads/MacroQuestCustom.sln" -OutFile "src/MacroQuestCustom.sln"

      - name: Get crashpad.h
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "token ${{ secrets.MQGITBOT_AUTH }}"
            Accept = "application/vnd.github.v3.raw"
          }
          Invoke-WebRequest -Uri ${{ vars.CUSTOM_CRASHPAD_URL }} -Headers $headers -OutFile "include/config/crashpad.h"

      - name: Set Versioning for MQMain
        shell: pwsh
        run: |
          $versionFile = "src/main/MQVersionInfo.h"
          $versionInfo = Get-Content $versionFile
          $versionInfo = $versionInfo -replace '#define MQMAIN_VERSION_REV\s+\d+', "#define MQMAIN_VERSION_REV   ${{ env.version_rev }}"
          $versionInfo = $versionInfo -replace '#define MQMAIN_VERSION_BUILD (\d+)', "#define MQMAIN_VERSION_BUILD ${{ github.run_number }}"
          $versionInfo = $versionInfo -replace '#define MQMAIN_GIT_HASH "(.*)"', "#define MQMAIN_GIT_HASH `"$(git rev-parse --short HEAD)`""
          $versionInfo | Set-Content $versionFile

      - name: Set Versioning for eqlib
        shell: pwsh
        run: |
          $versionFile = "src/eqlib/src/eqlibVersionInfo.h"
          $versionInfo = Get-Content $versionFile
          $versionInfo = $versionInfo -replace '#define EQLIB_GIT_HASH "(.*)"', "#define EQLIB_GIT_HASH `"$eqlibCommitHash`""
          $versionInfo | Set-Content $versionFile

      - name: Customize Loader Update URL
        shell: pwsh
        run: |
          $CurrentVersionURL = "https://raw.githubusercontent.com/macroquest/MQCurrentVersions/${{ inputs.client_target }}/CurrentVersion.txt"
          $resourceFilePath = "src/loader/resource.h"
          $resourceFile = Get-Content $resourceFilePath
          if ($resourceFile -match "#define MQ_UPDATE_URL") {
            $resourceFile -replace '#define MQ_UPDATE_URL (.*)', "#define MQ_UPDATE_URL `"$CurrentVersionURL`""
          } else {
            $resourceFile = $resourceFile + "`n#define MQ_UPDATE_URL `"$CurrentVersionURL`""
          }
          $resourceFile | Set-Content $resourceFilePath

      - name: Check Scoop Installation
        if: false # Disable scoop since we're not using sentry integration
        id: check_scoop
        shell: pwsh
        run: |
          $scoopPath = "$env:USERPROFILE\scoop"
          $packages = "${{ env.scoop_packages }}" -split '\s+'
          $allInstalled = $true

          if (Test-Path $scoopPath) {
            foreach ($pkg in $packages) {
              if (-not (Test-Path "$scoopPath\apps\$pkg")) {
                $allInstalled = $false
                break
              }
            }
          } else {
            $allInstalled = $false
          }

          $hash = (Get-FileHash -InputStream ([IO.MemoryStream]::new([Text.Encoding]::UTF8.GetBytes("${{ env.scoop_packages }}"))) -Algorithm SHA256).Hash.Substring(0,16)

          echo "scoop_ready=$allInstalled" >> $env:GITHUB_OUTPUT
          echo "scoop_packages_hash=$hash" >> $env:GITHUB_OUTPUT

      - name: Restore Scoop Cache
        if: false # Disable scoop since we're not using sentry integration
        # if: steps.check_scoop.outputs.scoop_ready != 'true'
        id: restore_scoop_cache
        uses: actions/cache@v5
        with:
          path: '~/scoop'
          key: ${{ runner.os }}-scoop-${{ steps.check_scoop.outputs.scoop_packages_hash }}

      - name: Install Scoop
        if: false # Disable scoop since we're not using sentry integration
        # if: steps.check_scoop.outputs.scoop_ready != 'true' && steps.restore_scoop_cache.outputs.cache-hit != 'true'
        uses: MinoruSekine/setup-scoop@v4.0.2
        with:
          install_scoop: 'true'
          buckets: extras
          apps: ${{ env.scoop_packages }}
          scoop_update: 'true'
          update_path: 'true'

      - name: Setup Scoop PATH
        if: false # Disable scoop since we're not using sentry integration
        # if: steps.check_scoop.outputs.scoop_ready == 'true' || steps.restore_scoop_cache.outputs.cache-hit == 'true'
        uses: MinoruSekine/setup-scoop@v4.0.2
        with:
          install_scoop: 'false'
          scoop_update: 'false'
          update_path: 'true'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: nuget/setup-nuget@v3

      - name: Restore NuGet packages
        run: |
          nuget restore src/MacroQuestCustom.sln

      - name: Check vcpkg Installation
        id: check_vcpkg
        shell: pwsh
        run: |
          $installedPath = "${{ github.workspace }}/contrib/vcpkg/installed"
          if ((Test-Path $installedPath) -and (Get-ChildItem $installedPath -Directory | Measure-Object).Count -gt 0) {
            echo "vcpkg_installed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "vcpkg_installed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Resolve vcpkg cache paths
        id: vcpkg_paths
        shell: pwsh
        run: |
          $p = & "$env:GITHUB_WORKSPACE/tools/build_scripts/Get-VcpkgState.ps1" -Mode CachePaths
          "list<<__PATHS_END__" >> $env:GITHUB_OUTPUT
          $p                    >> $env:GITHUB_OUTPUT
          "__PATHS_END__"       >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg Cache
        if: steps.check_vcpkg.outputs.vcpkg_installed != 'true'
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.vcpkg_paths.outputs.list }}
          key: ${{ runner.os }}-vcpkg-${{ env.platform }}-
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ env.platform }}-
            ${{ runner.os }}-vcpkg-

      - name: Build MQ2Main:${{ env.platform }} Release for ${{ inputs.client_target }}
        run: msbuild src/MacroQuestCustom.sln /NoLogo /Verbosity:minimal /p:Configuration=Release /p:Platform=${{ env.platform }} /m /t:core\MQ2Main /p:PreferredToolArchitecture=x64

      - name: Build ${{ env.platform }} Release for ${{ inputs.client_target }}
        run: msbuild src/MacroQuestCustom.sln /NoLogo /Verbosity:minimal /p:Configuration=Release /p:Platform=${{ env.platform }} /m /p:PreferredToolArchitecture=x64

      - name: Fingerprint vcpkg (post-build)
        id: vcpkg_post
        shell: pwsh
        run: |
          $h = try { & "$env:GITHUB_WORKSPACE/tools/build_scripts/Get-VcpkgState.ps1" -Mode Fingerprint } catch { "none" }
          echo "hash=$h" >> $env:GITHUB_OUTPUT
          # Show the fingerprint in the run summary so a manual luarocks-only dispatch can copy it.
          "## vcpkg fingerprint (copy for a luarocks-only dispatch)" >> $env:GITHUB_STEP_SUMMARY
          $h                                                         >> $env:GITHUB_STEP_SUMMARY

      - name: Look up existing vcpkg cache
        id: vcpkg_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.vcpkg_paths.outputs.list }}
          key: ${{ runner.os }}-vcpkg-${{ env.platform }}-${{ steps.vcpkg_post.outputs.hash }}
          lookup-only: true

      - name: Save vcpkg Cache
        if: steps.vcpkg_cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.vcpkg_paths.outputs.list }}
          key: ${{ runner.os }}-vcpkg-${{ env.platform }}-${{ steps.vcpkg_post.outputs.hash }}

      - name: Create Symbols Archive
        run: 7z a -tzip -r build/bin/MacroQuest-Symbols.zip build/bin/Release/*.exe build/bin/Release/*.dll build/bin/Release/*.pdb

      - name: Upload Symbols to Sentry
        if: false # Disable sentry integration
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: macroquest
          SENTRY_PROJECT: macroquest
        shell: pwsh
        run: |
          sentry-cli debug-files upload --wait "${{ github.workspace }}\build\bin\Release"

      - name: Upload Symbols Artifact
        uses: actions/upload-artifact@v7
        with:
          name: symbols-${{ inputs.client_target }}
          path: build/bin/MacroQuest-Symbols.zip

      - name: Remove Build Artifacts
        shell: pwsh
        run: |
          Remove-Item -Force build/bin/MacroQuest-Symbols.zip
          Get-ChildItem build/bin/Release -Include *.pdb -Recurse | Remove-Item -Force
          Get-ChildItem build/bin/Release -Include *.lib -Recurse | Remove-Item -Force
          Get-ChildItem build/bin/Release -Include *.exp -Recurse | Remove-Item -Force

      - name: Sign Code
        shell: pwsh
        env:
          KMS_KEY: ${{ secrets.KMS_KEY }}
          SIGNING_CERT: ${{ secrets.SIGNING_CERT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          # Fail fast if the kmscng CSP isn't installed on the runner. Otherwise signtool fails with a generic error.
          if (-not (Test-Path "$env:SystemRoot\System32\kmscng.dll")) {
            throw "Google Cloud KMS Provider (kmscng) is not installed on this runner. Install the MSI from https://github.com/GoogleCloudPlatform/kms-integrations/releases?q=cng&expanded=true and re-run."
          }
          $CertFile = "${{ github.workspace }}\build\bin\user.crt"
          $KeyFile = "${{ github.workspace }}\build\bin\gcp-sa.json"
          [IO.File]::WriteAllBytes($CertFile, [Convert]::FromBase64String($env:SIGNING_CERT))
          [IO.File]::WriteAllText($KeyFile, $env:GCP_SA_KEY)
          $env:GOOGLE_APPLICATION_CREDENTIALS = $KeyFile
          $FileList = Get-ChildItem -Path "build/bin/release" -Recurse -Include *.exe, *.dll |
            Where-Object { $_.Name -ne "D3DX9_43.dll" }
          $signtool = (Get-ChildItem -Recurse "${ENV:ProgramFiles(x86)}\Windows Kits" -Filter signtool.exe |
            Where-Object { $_.FullName -notmatch 'arm' } | Sort-Object LastWriteTime | Select-Object -last 1).FullName
          # Add a timeout to signtool since we're relying on cloud services and don't want hangs
          function Invoke-Signtool {
            param([string]$Exe, [string[]]$SignArgs, [int]$TimeoutSec)
            $psi = [System.Diagnostics.ProcessStartInfo]::new($Exe)
            foreach ($a in $SignArgs) { $psi.ArgumentList.Add($a) }
            $psi.UseShellExecute = $false
            $p = [System.Diagnostics.Process]::Start($psi)
            if (-not $p.WaitForExit($TimeoutSec * 1000)) {
              Write-Host "signtool exceeded ${TimeoutSec}s, killing..."
              try { $p.Kill($true) } catch {}
              return 1
            }
            return $p.ExitCode
          }

          $tsaServers = @('http://timestamp.digicert.com', 'http://timestamp.sectigo.com', 'http://ts.ssl.com')
          $tsaIndex = 0
          $maxAttempts = 5
          $chunkSize = 15
          $budgetSecPerFile = 6
          $baseArgs = @(
            'sign', '/fd', 'SHA256',
            '/f', $CertFile,
            '/csp', 'Google Cloud KMS Provider',
            '/kc', $env:KMS_KEY,
            '/td', 'sha256'
          )
          $all = @($FileList.FullName)
          for ($i = 0; $i -lt $all.Count; $i += $chunkSize) {
            $chunk = @($all[$i..([Math]::Min($i + $chunkSize - 1, $all.Count - 1))])
            $timeoutSec = 20 + $budgetSecPerFile * $chunk.Count
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              $tsa = $tsaServers[$tsaIndex]
              $rc = Invoke-Signtool -Exe $signtool -SignArgs ($baseArgs + @('/tr', $tsa) + $chunk) -TimeoutSec $timeoutSec
              if ($rc -eq 0) { break }
              if ($attempt -eq $maxAttempts) { throw "Signing failed for chunk at index $i ($($chunk.Count) files) after $maxAttempts attempts" }
              Write-Host "Chunk at index $i attempt $attempt failed/timed out (TSA: $tsa), switching TSA and retrying in 2s..."
              $tsaIndex = ($tsaIndex + 1) % $tsaServers.Length
              Start-Sleep -Seconds 2
            }
          }
          Remove-Item -Force $CertFile, $KeyFile

      - name: Create MacroQuest Archive
        shell: pwsh
        run: |
          Push-Location build/bin/Release
          7z a -tzip -r ../MacroQuest.zip *
          Pop-Location

      - name: Get Version Information
        shell: pwsh
        run: echo "MQVERSION_INFO=$((Get-Item build/bin/release/MQ2Main.dll).VersionInfo.FileVersion)" >> $env:GITHUB_ENV

      - name: Restore Last Changelog
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/changelog/CHANGELOG.md
          key: changelog-${{ env.platform }}-${{ inputs.client_target }}-${{ github.run_id }}
          restore-keys: |
            changelog-${{ env.platform }}-${{ inputs.client_target }}

      - name: Diff Changelog
        id: diff_changelog
        shell: pwsh
        run: |
          $ReleaseDescription = "Automated release for ${{ inputs.client_target }}"
          if (Test-Path "${{ github.workspace }}/build/changelog/CHANGELOG.md")
          {
            $FileDiff = (Compare-Object (Get-Content "${{ github.workspace }}/data/resources/CHANGELOG.md") (Get-Content "${{ github.workspace }}/build/changelog/CHANGELOG.md"))
            if ($FileDiff.Count -gt 0)
            {
                if ($FileDiff[0].SideIndicator -eq '<=')
                {
                    $ReleaseDescription = "Change Log:`r`n-----------`r`n"
                    $ReleaseDescription += $FileDiff.InputObject -join "`r`n`r`n"
                }
            }
          }
          else
          {
            New-Item -Path "${{ github.workspace }}/build/changelog" -ItemType Directory -ErrorAction SilentlyContinue
          }
          Copy-Item -Path "${{ github.workspace }}/data/resources/CHANGELOG.md" -Destination "${{ github.workspace }}/build/changelog/CHANGELOG.md" -Force
          Remove-Item -Force "${{ github.workspace }}/build/ReleaseNotes.md" -ErrorAction SilentlyContinue
          $ReleaseDescription | Out-File "${{ github.workspace }}/build/ReleaseNotes.md"

      - name: Remove Release '${{ github.ref_name }}'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.MQGITBOT_AUTH }}
        run: |
          $output = gh release delete ${{ github.ref_name }} --yes 2>&1
          if (!$? -And -Not($output -like "*release not found*")) {
            throw $output
          }
          exit 0

      - name: Create Release for ${{ inputs.client_target }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.MQGITBOT_AUTH }}
        run: |
          gh release create ${{ github.ref_name }} --title "MacroQuest (${{ inputs.client_target }}) v$($env:MQVERSION_INFO)" --notes-file "${{ github.workspace }}/build/ReleaseNotes.md" $(if ($${{ inputs.client_target == 'emu-rof2' }}) {"--latest"} else {"--prerelease"}) build/bin/MacroQuest.zip

      - name: Update Published Version Information
        shell: pwsh
        run: |
          $versionDir = "${{ github.workspace }}/build/MQCurrentVersions"
          git clone "https://x-access-token:${{ secrets.MQGITBOT_AUTH }}@github.com/MacroQuest/MQCurrentVersions.git" "$versionDir"
          git -C "$versionDir" config user.email "mqgitbot@gmail.com"
          git -C "$versionDir" config user.name "MQGitBot"
          $branch = "${{ inputs.client_target }}"
          $remoteBranch = git -C "$versionDir" ls-remote --heads origin $branch
          if ($remoteBranch) {
            git -C "$versionDir" checkout $branch
          } else {
            git -C "$versionDir" checkout -b $branch
          }
          Set-Content -NoNewLine -Path "$versionDir/CurrentVersion.txt" -Value $env:MQVERSION_INFO
          git -C "$versionDir" add CurrentVersion.txt
          git -C "$versionDir" commit -m "Update ${{ inputs.client_target }} version to $($env:MQVERSION_INFO)"
          if ($remoteBranch) {
            git -C "$versionDir" push
          } else {
            git -C "$versionDir" push --set-upstream origin $branch
          }

      - name: Send Discord Notice
        shell: pwsh
        run: |
          [System.Collections.ArrayList]$embedArray = @()
          $embedObject = [PSCustomObject]@{
              color = "4289797"
              title = "New MacroQuest (${{ inputs.client_target }}) Build $($env:MQVERSION_INFO)"
              description = "Build has been uploaded to: https://github.com/macroquest/macroquest/releases/tag/$($env:GITHUB_REF_NAME)"
          }
          $embedArray.Add($embedObject) | Out-Null
          $discordPayload = [PSCustomObject]@{
              embeds = $embedArray
          } | ConvertTo-Json
          Invoke-RestMethod -Uri '${{ secrets.MQDISCORD_WEBHOOK }}' -Method Post -Body $discordPayload -ContentType 'application/json'
        continue-on-error: true

  update_luarocks:
    needs: build
    uses: ./.github/workflows/update_luarocks.yaml
    with:
      client_target: ${{ inputs.client_target }}
      vcpkg_fingerprint: ${{ needs.build.outputs.vcpkg_fingerprint }}
    secrets: inherit

  update_symbols:
    if: github.repository == 'macroquest/macroquest'
    needs: build
    runs-on: [symbol, self-hosted, Windows, X64]
    steps:
      - name: Download Symbols Artifact
        uses: actions/download-artifact@v8
        with:
          name: symbols-${{ inputs.client_target }}
          path: ${{ github.workspace }}

      - name: Unzip Symbols
        shell: pwsh
        run: |
          $zip = "${{ github.workspace }}\MacroQuest-Symbols.zip"
          $dest = "${{ github.workspace }}\MacroQuest-Symbols"
          if (Test-Path -Path $dest) {
            Get-ChildItem $dest -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue -Recurse
            Remove-Item $dest -Force -Recurse
          }
          New-Item -ItemType Directory -Path $dest
          Expand-Archive -Path $zip -DestinationPath $dest

      - name: Update Symbol Server
        shell: pwsh
        run: |
          $ProjectTitle = $($env:GITHUB_REPOSITORY).Split("/")[1]
          $SymbolDir = "${{ secrets.SYMBOL_SRV_PATH }}"
          $ReleasePath = "${{ github.workspace }}\MacroQuest-Symbols"
          $symstore = (Get-ChildItem -Recurse "${ENV:ProgramFiles(x86)}\Windows Kits" -Filter symstore.exe | Where-Object { $_.FullName -notmatch 'arm' } | Sort-Object LastWriteTime | Select-Object -last 1).FullName
          $LASTEXITCODE = 0
          & $symstore add /r /f "$ReleasePath\*.dll" /s $SymbolDir /t "$ProjectTitle" /compress | Out-Null
          & $symstore add /r /f "$ReleasePath\*.exe" /s $SymbolDir /t "$ProjectTitle" /compress | Out-Null
          & $symstore add /r /f "$ReleasePath\*.pdb" /s $SymbolDir /t "$ProjectTitle" /compress | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to update symbol server"
          }
          $agestore = (Get-ChildItem -Recurse "${ENV:ProgramFiles(x86)}\Windows Kits" -Filter agestore.exe | Where-Object { $_.FullName -notmatch 'arm' } | Sort-Object LastWriteTime | Select-Object -last 1).FullName
          & $agestore $SymbolDir /days=60 /s /y  | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to age symbol server"
          }

      - name: Remove Symbols
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\MacroQuest-Symbols"
          if (Test-Path -Path $dest) {
            Get-ChildItem $dest -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue -Recurse
            Remove-Item $dest -Force -Recurse
          }
          $dest = "${{ github.workspace }}\MacroQuest-Symbols.zip"
