name: CI Emu TOB

on:
  push:
    branches:
      - master
    tags-ignore:
      - rel-*
      - beta-*

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  call_build:
    uses: ./.github/workflows/ci_shared.yaml
    with:
      client_target: emu-tob
    secrets: inherit